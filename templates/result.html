<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Sentiment Result</h1>

    <div class="result {{ result }}">
        {% if result == "positive" %}
            😊 POSITIVE
        {% elif result == "negative" %}
            😡 NEGATIVE
        {% else %}
            😐 NEUTRAL
        {% endif %}
    </div>

    <br>
    <a href="/">
        <button>Analyze Another</button>
    </a>
</div>

</body>
</html>
