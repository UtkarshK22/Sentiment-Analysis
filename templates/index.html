<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>💬 Sentiment Analysis System</h1>

    <form method="POST">
        <input type="text" name="text" placeholder="Enter your sentence" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    <div class="result">
        {{ prediction }}
    </div>

</body>
</html>
